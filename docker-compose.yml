version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: orbitly_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: AiAssistant_langgraph_memory

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  orbitly:

    build: .

    container_name: orbitly_app

    restart: always

    ports:
      - "8501:8501"

    env_file:
      - .env

    depends_on:
      - postgres


volumes:
  postgres_data: